- shell:
    - description: Install Homebrew
      command: command -v brew || /bin/bash -c "$(curl -fsSL
        https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

- brew:
    - fish # shell

    # languages
    - uv # python
    - node # js

    # docker
    - docker
    - docker-compose
    - colima # open source docker runtime
    - lima-additional-guestagents
    - qemu

    # tex
    - tectonic

    # git
    - git
    - git-crypt # encryption
    - gh # github

    # editor
    - neovim # editor
    - tree-sitter-cli

    # command line tools
    - zoxide # cd
    - starship # prompt
    - eza # better ls
    - fd # better find
    - ripgrep # better grep
    - ripgrep-all # search pdfs & more
    - bat # better cat
    - jq # json parser
    - scc # line counter
    - watchexec # run command on file change

    # for later config
    - zero-sh/tap/apply-user-defaults
    - dockutil
    - duti

- cask:
    # gui apps
    - kitty # https://search.nixos.org/packages?show=kitty
    - skim # https://search.nixos.org/packages?show=skimpdf
    - slack
    - zoom

    # menu bar apps
    - stats # https://search.nixos.org/packages?show=stats
    - hiddenbar # https://search.nixos.org/packages?show=hidden-bar

    # misc
    - the-unarchiver # https://search.nixos.org/packages?show=the-unarchiver
    - displaylink # third monitor on MBP
    - tailscale-app

    - font-cousine-nerd-font # font for kitty
    - mactex-no-gui # latex

- shell:
    - description: Install rustup
      command: command -v rustup || curl --proto '=https' --tlsv1.2 -sSf
        https://sh.rustup.rs | sh -s -- -y

    - description: Link docker-compose plugin
      command: |
        bash -c '
        mkdir -p ~/.docker/cli-plugins
        ln -sfn "$(brew --prefix)/opt/docker-compose/bin/docker-compose" ~/.docker/cli-plugins/docker-compose
        '

    - description: Install arf
      command: command -v arf || curl --proto '=https' --tlsv1.2 -LsSf
        https://github.com/eitsupi/arf/releases/latest/download/arf-console-installer.sh
        | sh

    - description: Set fish as default shell
      command: |
        bash -c '
        FISH=$(which fish)
        grep -qF "$FISH" /etc/shells || echo "$FISH" | sudo tee -a /etc/shells
        [ "$SHELL" = "$FISH" ] || chsh -s "$FISH"
        '

    - description: Apply user defaults
      command: bash -c 'apply-user-defaults macos/settings.yaml'

    - description: Set default apps
      command: bash -c 'duti macos/default-apps.duti'

    - description: Configure dock
      command: |
        bash -c '
        dockutil --remove all

        apps=(
            /Applications/Kitty.app
            /Applications/Safari.app
            /Applications/Calendar.app
            /Applications/Reminders.app
            /Applications/Mail.app
            /Applications/Slack.app
            /Applications/Messages.app
        )

        for app in "${apps[@]}"; do
            dockutil --add "$app" --no-restart
        done

        dockutil --add "$HOME/Downloads/" --display stack --sort dateadded --view fan --no-restart

        killall Finder Dock
        '

# latex
- create:
    - ~/Library/texmf/tex/latex
- link:
    ~/Library/texmf/tex/latex/local: latex
